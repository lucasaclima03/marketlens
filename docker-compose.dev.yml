services:
  postgres:
    image: postgres:16-alpine
    environment:
      POSTGRES_USER: marketlens
      POSTGRES_PASSWORD: dev
      POSTGRES_DB: marketlens_dev
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U marketlens -d marketlens_dev']
      interval: 5s
      timeout: 3s
      retries: 5

  redis:
    image: redis:7-alpine
    ports:
      # Host 6380 → container 6379 to avoid conflict with other local Redis instances.
      - '6380:6379'
    volumes:
      - redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      retries: 5

volumes:
  postgres_data:
  redis_data:
